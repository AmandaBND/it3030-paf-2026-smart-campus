spring.config.import=optional:dotenv:
spring.application.name=smart-campus-api

# MySQL (override via env or local profile)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Google OAuth2 (set env GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET or use application-local.properties)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-for-production-min-256-bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.qr.hmac-secret=${QR_HMAC_SECRET:change-qr-hmac-secret}
app.upload.dir=${UPLOAD_DIR:uploads}
app.dev-login.enabled=${DEV_LOGIN_ENABLED:true}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

server.port=8080
